<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1200" fill="#F8F2EA"/>
  <rect x="72" y="72" width="1456" height="1056" rx="44" fill="#FFFDF9" stroke="#E7DED3"/>
  <text x="120" y="152" fill="#A05A35" font-family="DM Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4">NAMU LOGO EXPLORATION</text>
  <text x="120" y="214" fill="#171514" font-family="DM Sans, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-2">Concept 3: Human Voice</text>
  <text x="120" y="264" fill="#5E564F" font-family="DM Sans, Arial, sans-serif" font-size="28">Softer, more conversational, and language-first.</text>

  <rect x="120" y="328" width="1360" height="336" rx="36" fill="#FFF8F1" stroke="#E9DED2"/>
  <text x="160" y="384" fill="#9C6A49" font-family="DM Sans, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">LIGHT BACKGROUND</text>
  <g transform="translate(170 430)">
    <g fill="none" stroke="#D6703F" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
      <path d="M48 110V50L120 110V50L192 110V50"/>
    </g>
    <circle cx="120" cy="80" r="13" fill="#D6703F"/>
    <text x="242" y="102" fill="#171514" font-family="DM Sans, Arial, sans-serif" font-size="60" font-weight="700" letter-spacing="-3">Namu</text>
  </g>

  <rect x="120" y="700" width="1360" height="336" rx="36" fill="#171514"/>
  <text x="160" y="756" fill="#CFA78B" font-family="DM Sans, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">DARK BACKGROUND</text>
  <g transform="translate(170 802)">
    <g fill="none" stroke="#D6703F" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
      <path d="M48 110V50L120 110V50L192 110V50"/>
    </g>
    <circle cx="120" cy="80" r="13" fill="#D6703F"/>
    <text x="242" y="102" fill="#F5EFE6" font-family="DM Sans, Arial, sans-serif" font-size="60" font-weight="700" letter-spacing="-3">Namu</text>
  </g>

  <text x="960" y="466" fill="#171514" font-family="DM Sans, Arial, sans-serif" font-size="30" font-weight="700">Why it works</text>
  <text x="960" y="514" fill="#5E564F" font-family="DM Sans, Arial, sans-serif" font-size="24">Feels accessible and human.</text>
  <text x="960" y="552" fill="#5E564F" font-family="DM Sans, Arial, sans-serif" font-size="24">Connects more directly to language and exchange.</text>
  <text x="960" y="590" fill="#5E564F" font-family="DM Sans, Arial, sans-serif" font-size="24">Friendliest of the three directions.</text>

  <text x="960" y="838" fill="#F5EFE6" font-family="DM Sans, Arial, sans-serif" font-size="30" font-weight="700">Risk</text>
  <text x="960" y="886" fill="#D8CEC4" font-family="DM Sans, Arial, sans-serif" font-size="24">Less iconic as a standalone symbol.</text>
  <text x="960" y="924" fill="#D8CEC4" font-family="DM Sans, Arial, sans-serif" font-size="24">Could read more illustrative than systemic.</text>
  <text x="960" y="962" fill="#D8CEC4" font-family="DM Sans, Arial, sans-serif" font-size="24">Needs more compression to feel premium.</text>
</svg>
