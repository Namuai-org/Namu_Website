  <text x="960" y="466" fill="#171514" font-family="DM Sans, Arial, sans-serif" font-size="30" font-weight="700">Why it works</text>
  <text x="960" y="514" fill="#5E564F" font-family="DM Sans, Arial, sans-serif" font-size="24">Separate forms become whole together.</text>
  <text x="960" y="552" fill="#5E564F" font-family="DM Sans, Arial, sans-serif" font-size="24">Feels rooted without becoming decorative.</text>
  <text x="960" y="590" fill="#5E564F" font-family="DM Sans, Arial, sans-serif" font-size="24">Best balance of icon strength and warmth.</text>

  <text x="960" y="838" fill="#F5EFE6" font-family="DM Sans, Arial, sans-serif" font-size="30" font-weight="700">Best use</text>
  <text x="960" y="886" fill="#D8CEC4" font-family="DM Sans, Arial, sans-serif" font-size="24">Primary logo system candidate.</text>
  <text x="960" y="924" fill="#D8CEC4" font-family="DM Sans, Arial, sans-serif" font-size="24">Strongest storytelling foundation.</text>
  <text x="960" y="962" fill="#D8CEC4" font-family="DM Sans, Arial, sans-serif" font-size="24">Recommended to refine next.</text>
