  <text x="120" y="152" fill="#A05A35" font-family="DM Sans, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4">NAMU LOGO EXPLORATION</text>
  <text x="120" y="214" fill="#171514" font-family="DM Sans, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-2">Concept 1: Woven Belonging</text>
  <text x="120" y="264" fill="#5E564F" font-family="DM Sans, Arial, sans-serif" font-size="28">Shared structure, human warmth, and the clearest expression of "ours."</text>

